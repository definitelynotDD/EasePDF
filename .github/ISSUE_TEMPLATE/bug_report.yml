name: 🐛 Bug Report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report! Please fill out the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run the OCR tool on a scanned PDF, …
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the … tool
        2. Upload …
        3. Click Process
        4. See error
    validations:
      required: true
  - type: input
    id: tool
    attributes:
      label: Which tool?
      placeholder: e.g. OCR PDF, Merge PDF, PDF Tables → Excel
  - type: dropdown
    id: environment
    attributes:
      label: Where did it happen?
      options:
        - Live site (easepdf-toolkit.vercel.app)
        - Local (self-hosted)
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 126 on Windows 11
  - type: textarea
    id: console
    attributes:
      label: Console errors (optional)
      description: Paste any errors from DevTools → Console.
      render: shell
