# Render Blueprint for the easePDF native-Tesseract OCR backend.
# Deploy: push to GitHub, then on render.com → New → Blueprint → pick this repo.
services:
  - type: web
    name: easepdf-ocr
    runtime: docker
    rootDir: server
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # CORS allow-list. Locked to the production site so other websites can't
      # freeload on this backend. Comma-separate to add preview domains, e.g.
      # "https://easepdf-toolkit.vercel.app,https://easepdf-toolkitvercelapp-git-main-….vercel.app".
      # Use "*" only for local testing.
      - key: ALLOWED_ORIGIN
        value: "https://easepdf-toolkit.vercel.app"
      - key: MAX_FILE_MB
        value: "50"
      - key: MAX_PAGES
        value: "50"
      - key: OCR_DPI
        value: "300"
      - key: RATE_LIMIT_MAX        # OCR requests per minute per IP
        value: "20"
